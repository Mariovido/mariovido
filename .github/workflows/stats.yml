name: Update README cards

on:
  schedule:
    - cron: "0 22 * * 1" # Every Monday 00:00 CEST (22:00 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dracula&hide=contribs,issues&show=reviews,prs_merged&rank_icon=github
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
